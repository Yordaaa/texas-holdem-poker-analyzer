server {
    listen 80;
    server_name _;

    # Gzip compression (including wasm)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/xml+rss
               application/javascript application/json
               application/wasm;

    root /usr/share/nginx/html;
    index index.html;

    # ─── API proxy to backend ───────────────────────────────────────────────
    location /api/ {
        proxy_pass http://texas-backend:8080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Health check ────────────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ─── No-cache for bootstrap files ────────────────────────────────────────
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma no-cache;
        expires 0;
    }
    location = /flutter_bootstrap.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }
    location = /flutter_service_worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # ─── JSON / binary asset files — serve real file, return 404 if missing ──
    # IMPORTANT: do NOT fall back to index.html for these or Flutter breaks
    location ~* \.(json|bin)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=3600";
    }

    # ─── Flutter /assets/ directory ──────────────────────────────────────────
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=3600";
    }

    # ─── WASM files ──────────────────────────────────────────────────────────
    location ~* \.wasm$ {
        try_files $uri =404;
        default_type application/wasm;
        add_header Cache-Control "public, max-age=86400";
    }

    # ─── Aggressively cache fingerprinted JS/CSS/font/image assets ───────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ─── SPA fallback — Flutter routes go to index.html ─────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # ─── Server errors only (NOT 404 — that would break asset loading) ───────
    error_page 500 502 503 504 /index.html;
}
