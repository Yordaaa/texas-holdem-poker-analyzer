version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: texas-backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    networks:
      - poker-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: texas-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - poker-network
    environment:
      - BACKEND_URL=http://backend:8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  poker-network:
    driver: bridge
